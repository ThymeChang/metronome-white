<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>节拍器</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#fafaf8;
  --border:#e4e2dc;--border2:#d0cec7;
  --ink:#1a1916;--ink2:#6b6860;--ink3:#aaa89f;
  --hi:#c8773a;--hi2:rgba(200,119,58,.1);--red:#c94040;--green:#3a9e6e;--blue:#3a74c9;
}
body{background:var(--bg);color:var(--ink);font-family:'DM Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 80px;}
h1{font-family:'DM Serif Display',serif;font-size:13px;letter-spacing:.15em;color:var(--ink3);text-transform:uppercase;margin-bottom:20px;font-weight:400;}
.card{width:100%;max-width:760px;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 2px 4px rgba(0,0,0,.04),0 8px 32px rgba(0,0,0,.07);overflow:hidden;}

/* ── topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;border-bottom:1px solid var(--border);background:var(--surface2);}
.brand{font-family:'DM Serif Display',serif;font-size:20px;color:var(--ink);}
.led{width:7px;height:7px;border-radius:50%;background:#ccc;transition:all .08s;margin-left:8px;}
.led.on{background:var(--green);box-shadow:0 0 6px rgba(58,158,110,.5);}
.hint{font-size:9px;color:var(--ink3);letter-spacing:.08em;}

/* ── chord display ── */
.chord-bar{display:flex;align-items:center;gap:0;overflow:hidden;border-bottom:1px solid var(--border);min-height:44px;background:var(--surface2);position:relative;}
.chord-slot{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;border-right:1px solid var(--border);cursor:default;transition:background .12s;min-width:0;}
.chord-slot:last-child{border-right:none;}
.chord-slot.active{background:rgba(200,119,58,.09);}
.chord-name{font-family:'DM Serif Display',serif;font-size:18px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center;}
.chord-slot.active .chord-name{color:var(--hi);}
.chord-idx{font-size:8px;color:var(--ink3);letter-spacing:.08em;margin-top:1px;}
.chord-empty{width:100%;text-align:center;font-size:10px;color:var(--ink3);padding:12px 20px;letter-spacing:.05em;}

/* ── beat dots ── */
.beat-row{display:flex;gap:6px;align-items:center;justify-content:center;padding:14px 20px 10px;flex-wrap:wrap;}
.bdot{width:30px;height:30px;border-radius:50%;border:2px solid var(--border2);background:var(--bg);
  transition:background .05s,box-shadow .05s,border-color .05s;flex-shrink:0;cursor:pointer;position:relative;user-select:none;}
.bdot::after{content:'';position:absolute;inset:0;border-radius:50%;}
/* accent levels: 0=mute, 1=normal, 2=accent */
.bdot[data-accent="2"]{border-color:#c8773a88;}
.bdot[data-accent="0"]{opacity:.35;border-style:dashed;}
.bdot.lit[data-accent="2"]{background:var(--red);border-color:var(--red);box-shadow:0 0 14px rgba(201,64,64,.5);}
.bdot.lit[data-accent="1"]{background:var(--hi);border-color:var(--hi);box-shadow:0 0 12px rgba(200,119,58,.45);}
.bdot.lit[data-accent="0"]{background:transparent;}
.bdot.muted-beat{background:rgba(200,119,58,.1);border-color:rgba(200,119,58,.28);opacity:.5;}
.beat-hint{font-size:9px;color:var(--ink3);text-align:center;padding:0 20px 8px;letter-spacing:.06em;}

/* ── canvas ── */
.viz-wrap{padding:4px 20px 14px;}
.viz-lbl{font-size:9px;letter-spacing:.15em;color:var(--ink3);text-transform:uppercase;margin-bottom:6px;}
canvas#rc{width:100%;height:88px;display:block;border-radius:6px;border:1px solid var(--border);}

/* ── section divider ── */
.sec{border-top:1px solid var(--border);}

/* ── two-col ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;}
.col-block{padding:16px 20px;}
.col-block+.col-block{border-left:1px solid var(--border);}
.clabel{font-size:9px;letter-spacing:.15em;color:var(--ink3);text-transform:uppercase;margin-bottom:10px;}

/* ── BPM ── */
.bpm-row{display:flex;align-items:center;gap:8px;}
.bpm-field{font-family:'DM Serif Display',serif;font-size:54px;line-height:1;color:var(--ink);background:transparent;border:none;outline:none;width:120px;-moz-appearance:textfield;}
.bpm-field::-webkit-inner-spin-button,.bpm-field::-webkit-outer-spin-button{-webkit-appearance:none;}
.bpm-field:focus{color:var(--hi);}
.adj-col{display:flex;flex-direction:column;gap:3px;}
.adj-btn{width:26px;height:26px;border-radius:5px;background:var(--bg);border:1px solid var(--border2);color:var(--ink2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;user-select:none;}
.adj-btn:hover{border-color:var(--hi);color:var(--hi);}
.tname{font-size:10px;color:var(--ink3);letter-spacing:.05em;margin-top:4px;}

/* ── time sig ── */
.sig-inputs{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.sig-input{font-family:'DM Serif Display',serif;font-size:38px;line-height:1;color:var(--ink);background:var(--bg);border:1px solid var(--border2);border-radius:6px;outline:none;width:62px;text-align:center;-moz-appearance:textfield;padding:4px 0;}
.sig-input::-webkit-inner-spin-button,.sig-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.sig-input:focus{border-color:var(--hi);color:var(--hi);}
.sig-slash{font-family:'DM Serif Display',serif;font-size:32px;color:var(--ink3);}
.den-chips{display:flex;flex-wrap:wrap;gap:4px;}
.dchip{min-width:34px;height:26px;border-radius:5px;background:var(--bg);border:1px solid var(--border2);color:var(--ink2);font-size:11px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;user-select:none;}
.dchip:hover{border-color:var(--hi);color:var(--hi);}
.dchip.on{background:var(--hi);border-color:var(--hi);color:#fff;}

/* ── BPM Ramp ── */
.ramp-section{padding:14px 20px;border-top:1px solid var(--border);}
.ramp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ramp-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;}
.toggle-track{width:34px;height:18px;border-radius:9px;background:var(--border2);position:relative;transition:background .2s;flex-shrink:0;}
.toggle-thumb{width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);position:absolute;top:2px;left:2px;transition:left .2s;}
.ramp-toggle.on .toggle-track{background:var(--hi);}
.ramp-toggle.on .toggle-thumb{left:18px;}
.ramp-toggle-label{font-size:10px;color:var(--ink2);letter-spacing:.05em;}
.ramp-toggle.on .ramp-toggle-label{color:var(--hi);}
.ramp-status{font-size:10px;color:var(--ink3);letter-spacing:.04em;}
.ramp-status.active{color:var(--green);}
.ramp-fields{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;transition:opacity .2s;}
.ramp-fields.disabled{opacity:.4;pointer-events:none;}
.ramp-field{display:flex;flex-direction:column;gap:4px;}
.ramp-label{font-size:9px;letter-spacing:.1em;color:var(--ink3);text-transform:uppercase;}
.ramp-input{font-family:'DM Serif Display',serif;font-size:22px;color:var(--ink);background:var(--bg);border:1px solid var(--border2);border-radius:6px;outline:none;width:100%;text-align:center;padding:5px 0;-moz-appearance:textfield;}
.ramp-input::-webkit-inner-spin-button,.ramp-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.ramp-input:focus{border-color:var(--hi);color:var(--hi);}
.ramp-progress{margin-top:8px;display:none;}
.ramp-progress.show{display:block;}
.ramp-bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px;}
.ramp-bar{height:100%;background:var(--hi);border-radius:2px;width:0%;transition:width .3s;}
.ramp-prog-lbl{font-size:9px;color:var(--ink3);letter-spacing:.06em;margin-top:3px;}

/* ── Chord editor ── */
.chord-section{padding:14px 20px;border-top:1px solid var(--border);}
.chord-editor-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.chord-inputs-wrap{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end;}
.chord-input-group{display:flex;flex-direction:column;gap:3px;}
.chord-input-lbl{font-size:8px;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;}
.chord-text-input{font-family:'DM Serif Display',serif;font-size:20px;color:var(--ink);background:var(--bg);border:1px solid var(--border2);border-radius:6px;outline:none;width:70px;text-align:center;padding:4px 0;}
.chord-text-input:focus{border-color:var(--hi);}
.chord-text-input.has-val{border-color:var(--border2);color:var(--ink);}
.chord-remove{width:22px;height:22px;border-radius:50%;background:transparent;border:1px solid var(--border2);color:var(--ink3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;line-height:1;transition:all .1s;flex-shrink:0;margin-bottom:2px;}
.chord-remove:hover{border-color:var(--red);color:var(--red);}
.chord-add-btn{height:38px;padding:0 12px;background:var(--bg);border:1px dashed var(--border2);border-radius:6px;color:var(--ink3);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .1s;white-space:nowrap;align-self:flex-end;margin-bottom:2px;}
.chord-add-btn:hover{border-color:var(--hi);color:var(--hi);}
.chord-hint{font-size:9px;color:var(--ink3);margin-top:6px;letter-spacing:.04em;}
.measures-input-row{display:flex;align-items:center;gap:6px;margin-top:8px;}
.measures-label{font-size:9px;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;}
.measures-field{font-family:'DM Mono',monospace;font-size:13px;color:var(--ink);background:var(--bg);border:1px solid var(--border2);border-radius:5px;outline:none;width:44px;text-align:center;padding:3px 0;-moz-appearance:textfield;}
.measures-field::-webkit-inner-spin-button,.measures-field::-webkit-outer-spin-button{-webkit-appearance:none;}
.measures-field:focus{border-color:var(--hi);}

/* ── sound ── */
.sound-section{border-top:1px solid var(--border);padding:14px 20px;}
.sound-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:6px;margin-top:8px;}
.sound-card{padding:8px 6px 6px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;text-align:center;display:flex;flex-direction:column;gap:3px;align-items:center;transition:all .12s;}
.sound-card:hover{background:#f0efeb;}
.sound-card.on{background:var(--hi2);border-color:var(--hi);}
.sound-icon{font-size:19px;line-height:1;}
.sound-name{font-size:10px;color:var(--ink2);}
.sound-card.on .sound-name{color:var(--hi);}

/* ── patterns ── */
.pat-section{border-top:1px solid var(--border);}
.cat-tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none;background:var(--surface2);}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{padding:9px 14px;font-size:9px;letter-spacing:.12em;white-space:nowrap;color:var(--ink3);border-bottom:2px solid transparent;cursor:pointer;transition:all .12s;flex-shrink:0;text-transform:uppercase;}
.cat-tab:hover{color:var(--ink2);}
.cat-tab.on{color:var(--hi);border-bottom-color:var(--hi);}
.pat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:6px;padding:12px 16px;}
.pat-card{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;padding:8px 10px 6px;transition:all .12s;display:flex;flex-direction:column;gap:3px;}
.pat-card:hover{background:#f0efeb;}
.pat-card.on{background:var(--hi2);border-color:var(--hi);}
.pat-name{font-size:11px;color:var(--ink);}
.pat-desc{font-size:9px;color:var(--ink3);}
.pat-card.on .pat-name{color:var(--hi);}
.pat-preview{display:flex;gap:2px;align-items:flex-end;height:15px;margin-top:3px;}
.ppb{flex:1;border-radius:1px;min-height:2px;background:var(--border2);}
.pat-card.on .ppb{background:rgba(200,119,58,.38);}

/* ── transport ── */
.transport{border-top:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.play-btn{width:52px;height:52px;border-radius:50%;background:var(--ink);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.play-btn:hover{background:#333;transform:scale(1.04);}
.play-btn.playing{background:var(--hi);}
.play-tri{width:0;height:0;border-top:10px solid transparent;border-bottom:10px solid transparent;border-left:16px solid #fff;margin-left:3px;}
.play-sq{display:none;width:14px;height:14px;background:#fff;border-radius:2px;}
.play-btn.playing .play-tri{display:none;}
.play-btn.playing .play-sq{display:block;}
.tap-btn{flex:1;min-width:80px;height:42px;background:var(--bg);border:1.5px solid var(--border2);color:var(--ink2);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;border-radius:8px;cursor:pointer;transition:all .1s;text-transform:uppercase;}
.tap-btn:hover{border-color:var(--ink2);color:var(--ink);}
.tap-btn:active{border-color:var(--hi);color:var(--hi);}
/* random mute */
.mute-toggle{display:flex;align-items:center;gap:6px;padding:0 12px;height:42px;background:var(--bg);border:1.5px solid var(--border2);border-radius:8px;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;color:var(--ink2);transition:all .15s;white-space:nowrap;flex-shrink:0;user-select:none;}
.mute-toggle:hover{border-color:var(--ink2);}
.mute-toggle.on{background:var(--hi2);border-color:var(--hi);color:var(--hi);}
.mute-badge{font-size:9px;font-weight:500;padding:1px 5px;border-radius:4px;background:var(--border);color:var(--ink3);transition:all .15s;}
.mute-toggle.on .mute-badge{background:var(--hi);color:#fff;}
.mute-density-wrap{display:none;align-items:center;gap:8px;width:100%;}
.mute-density-wrap.show{display:flex;}
.density-lbl{font-size:9px;letter-spacing:.12em;color:var(--ink3);text-transform:uppercase;white-space:nowrap;}
.denschip{padding:4px 11px;border-radius:6px;background:var(--bg);border:1.5px solid var(--border2);color:var(--ink2);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;transition:all .12s;}
.denschip:hover{border-color:var(--hi);color:var(--hi);}
.denschip.on{background:var(--hi2);border-color:var(--hi);color:var(--hi);}
.vol-wrap{display:flex;align-items:center;gap:8px;width:100%;}
.vol-ic{font-size:13px;flex-shrink:0;}
.vol-sl{-webkit-appearance:none;appearance:none;flex:1;height:3px;background:var(--border2);border-radius:2px;outline:none;cursor:pointer;}
.vol-sl::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--ink);cursor:pointer;transition:background .1s;}
.vol-sl::-webkit-slider-thumb:hover{background:var(--hi);}

@media(max-width:520px){
  .two-col{grid-template-columns:1fr;}
  .col-block+.col-block{border-left:none;border-top:1px solid var(--border);}
  .bpm-field{font-size:44px;}
  .ramp-fields{grid-template-columns:1fr 1fr;}
  .sound-grid{grid-template-columns:repeat(auto-fill,minmax(72px,1fr));}
}
</style>
</head>
<body>
<h1>Metronome · 节拍器</h1>
<div class="card">

  <!-- topbar -->
  <div class="topbar">
    <div style="display:flex;align-items:center;">
      <div class="brand">Tempo One</div>
      <div class="led" id="led"></div>
    </div>
    <div class="hint">SPACE 开始 &nbsp;·&nbsp; T 点击测速 &nbsp;·&nbsp; ↑↓ 调速</div>
  </div>

  <!-- chord bar -->
  <div class="chord-bar" id="chordBar">
    <div class="chord-empty" id="chordEmpty">在下方添加和弦进行，练习时会在此处跟随小节切换显示</div>
  </div>

  <!-- beat dots -->
  <div class="beat-row" id="beatRow"></div>
  <div class="beat-hint">点击节拍圈切换强拍 🔴 / 普通拍 🟠 / 静音拍 ○</div>

  <!-- rhythm visualizer -->
  <div class="viz-wrap">
    <div class="viz-lbl">节奏型可视化</div>
    <canvas id="rc"></canvas>
  </div>

  <!-- BPM + Time Sig -->
  <div class="two-col sec">
    <div class="col-block">
      <div class="clabel">速度 · BPM</div>
      <div class="bpm-row">
        <input type="number" id="bpmField" class="bpm-field" value="120" min="20" max="300">
        <div class="adj-col">
          <div class="adj-btn" onclick="adjBpm(1)">▲</div>
          <div class="adj-btn" onclick="adjBpm(-1)">▼</div>
        </div>
      </div>
      <div class="tname" id="tname">Allegro</div>
    </div>
    <div class="col-block">
      <div class="clabel">拍号 · Time Signature</div>
      <div class="sig-inputs">
        <input type="number" id="sigNum" class="sig-input" value="4" min="1" max="16">
        <div class="sig-slash">/</div>
        <input type="number" id="sigDenDisp" class="sig-input" value="4" readonly style="cursor:default;">
      </div>
      <div class="den-chips" id="denChips"></div>
    </div>
  </div>

  <!-- BPM Ramp -->
  <div class="ramp-section">
    <div class="ramp-header">
      <div class="ramp-toggle" id="rampToggle" onclick="toggleRamp()">
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
        <span class="ramp-toggle-label">渐进加速 · BPM Ramp</span>
      </div>
      <div class="ramp-status" id="rampStatus"></div>
    </div>
    <div class="ramp-fields disabled" id="rampFields">
      <div class="ramp-field">
        <div class="ramp-label">起始 BPM</div>
        <input type="number" class="ramp-input" id="rampStart" value="60" min="20" max="300">
      </div>
      <div class="ramp-field">
        <div class="ramp-label">目标 BPM</div>
        <input type="number" class="ramp-input" id="rampTarget" value="120" min="20" max="300">
      </div>
      <div class="ramp-field">
        <div class="ramp-label">每次加速</div>
        <input type="number" class="ramp-input" id="rampStep" value="2" min="1" max="20">
      </div>
      <div class="ramp-field">
        <div class="ramp-label">间隔小节</div>
        <input type="number" class="ramp-input" id="rampMeasures" value="4" min="1" max="32">
      </div>
    </div>
    <div class="ramp-progress" id="rampProgress">
      <div class="ramp-bar-wrap"><div class="ramp-bar" id="rampBar"></div></div>
      <div class="ramp-prog-lbl" id="rampProgLbl"></div>
    </div>
  </div>

  <!-- Chord editor -->
  <div class="chord-section">
    <div class="chord-editor-header">
      <div class="clabel" style="margin:0">和弦进行 · Chord Progression</div>
    </div>
    <div class="chord-inputs-wrap" id="chordInputsWrap"></div>
    <button class="chord-add-btn" id="chordAddBtn" onclick="addChordInput()">＋ 添加和弦</button>
    <div class="measures-input-row">
      <span class="measures-label">每个和弦持续</span>
      <input type="number" class="measures-field" id="chordMeasures" value="1" min="1" max="16">
      <span class="measures-label">小节</span>
    </div>
    <div class="chord-hint">和弦按顺序循环，留空的和弦自动跳过</div>
  </div>

  <!-- Sound -->
  <div class="sound-section sec">
    <div class="clabel">音色 · Sound Type</div>
    <div class="sound-grid" id="soundGrid"></div>
  </div>

  <!-- Patterns -->
  <div class="pat-section">
    <div class="cat-tabs" id="catTabs"></div>
    <div class="pat-grid" id="patGrid"></div>
  </div>

  <!-- Transport -->
  <div class="transport">
    <button class="play-btn" id="playBtn" onclick="togglePlay()">
      <div class="play-tri"></div><div class="play-sq"></div>
    </button>
    <button class="tap-btn" onclick="tapTempo()">Tap Tempo</button>
    <button class="mute-toggle" id="muteToggle" onclick="toggleRandomMute()">
      <span>🎲 随机空拍</span>
      <span class="mute-badge" id="muteBadge">关</span>
    </button>
    <div class="mute-density-wrap" id="muteDensityWrap">
      <span class="density-lbl">密度</span>
      <div id="densityChips" style="display:flex;gap:5px;"></div>
    </div>
    <div class="vol-wrap">
      <span class="vol-ic">🔈</span>
      <input type="range" class="vol-sl" id="volSl" min="0" max="1" step="0.01" value="0.7">
      <span class="vol-ic">🔊</span>
    </div>
  </div>

</div><!-- /card -->
<script>
// ── Core state ──────────────────────────────────────────────────────────────

// ── BPM Ramp ────────────────────────────────────────────────────────────────
let rampEnabled=false, rampMeasureCount=0;
function toggleRamp(){
  rampEnabled=!rampEnabled;
  document.getElementById('rampToggle').classList.toggle('on',rampEnabled);
  document.getElementById('rampFields').classList.toggle('disabled',!rampEnabled);
  document.getElementById('rampProgress').classList.toggle('show',rampEnabled&&isPlaying);
  if(rampEnabled&&isPlaying){ setBpm(+document.getElementById('rampStart').value); rampMeasureCount=0; }
  updateRampStatus();
}
function updateRampStatus(){
  const el=document.getElementById('rampStatus');
  if(!rampEnabled){el.textContent='';el.className='ramp-status';return;}
  const s=+document.getElementById('rampStart').value, t=+document.getElementById('rampTarget').value;
  el.textContent=isPlaying?`${bpm} → ${t} BPM`:`${s} → ${t} BPM`;
  el.className='ramp-status'+(isPlaying?' active':'');
}
function tickRamp(){
  if(!rampEnabled||!isPlaying)return;
  rampMeasureCount++;
  const step=+document.getElementById('rampStep').value;
  const every=+document.getElementById('rampMeasures').value;
  const target=+document.getElementById('rampTarget').value;
  const start=+document.getElementById('rampStart').value;
  if(rampMeasureCount%every===0){
    const newBpm=Math.min(bpm+step,target);
    setBpm(newBpm);
    if(newBpm>=target){
      // reached target — keep playing at target
    }
  }
  const prog=Math.min(1,(bpm-start)/Math.max(1,target-start));
  document.getElementById('rampBar').style.width=(prog*100)+'%';
  document.getElementById('rampProgLbl').textContent=`${bpm} BPM · 已加速 ${rampMeasureCount} 小节`;
  updateRampStatus();
}

// ── Chord Progression ────────────────────────────────────────────────────────
let chordInputValues=[]; // tracked live from inputs
let currentChordIdx=0, chordMeasureCounter=0;

function getChords(){
  return Array.from(document.querySelectorAll('.chord-text-input'))
    .map(el=>el.value.trim()).filter(v=>v!=='');
}
function addChordInput(val=''){
  const wrap=document.getElementById('chordInputsWrap');
  const grp=document.createElement('div');
  grp.className='chord-input-group';
  const lbl=document.createElement('div');
  lbl.className='chord-input-lbl';
  lbl.textContent='和弦 '+(wrap.children.length+1);
  const row=document.createElement('div');
  row.style.cssText='display:flex;align-items:center;gap:4px;';
  const inp=document.createElement('input');
  inp.type='text'; inp.className='chord-text-input'; inp.placeholder='Am';
  inp.maxLength=8; inp.value=val;
  inp.addEventListener('input',()=>{updateChordBar();});
  const rm=document.createElement('button');
  rm.className='chord-remove'; rm.textContent='×';
  rm.onclick=()=>{ grp.remove(); renumberChordLabels(); updateChordBar(); };
  row.appendChild(inp); row.appendChild(rm);
  grp.appendChild(lbl); grp.appendChild(row);
  wrap.appendChild(grp);
  updateChordBar();
}
function renumberChordLabels(){
  document.querySelectorAll('.chord-input-lbl').forEach((l,i)=>{ l.textContent='和弦 '+(i+1); });
}
function updateChordBar(){
  const chords=getChords();
  const bar=document.getElementById('chordBar');
  const empty=document.getElementById('chordEmpty');
  if(chords.length===0){
    bar.innerHTML=''; bar.appendChild(empty); return;
  }
  bar.innerHTML='';
  chords.forEach((c,i)=>{
    const slot=document.createElement('div');
    slot.className='chord-slot'+(i===currentChordIdx?' active':'');
    slot.id='cslot'+i;
    slot.innerHTML=`<div class="chord-name">${c}</div><div class="chord-idx">${i+1}</div>`;
    bar.appendChild(slot);
  });
}
function advanceChord(){
  const chords=getChords(); if(chords.length===0)return;
  const measuresPerChord=Math.max(1,+document.getElementById('chordMeasures').value||1);
  chordMeasureCounter++;
  if(chordMeasureCounter>=measuresPerChord){
    chordMeasureCounter=0;
    currentChordIdx=(currentChordIdx+1)%chords.length;
    setTimeout(updateChordBar,0);
  }
}
function resetChord(){ currentChordIdx=0; chordMeasureCounter=0; updateChordBar(); }

// improved synths
function synthBeep(ac,freq,v,t){
  const o=ac.createOscillator(),g=ac.createGain(); o.connect(g); g.connect(ac.destination);
  o.frequency.value=freq; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(v,t+.001);
  g.gain.exponentialRampToValueAtTime(.001,t+.09); o.start(t); o.stop(t+.1);
}
function synthWoodblock(ac,freq,v,t){
  const o=ac.createOscillator(),g=ac.createGain(); o.type='sine'; o.connect(g); g.connect(ac.destination);
  o.frequency.setValueAtTime(freq*.6,t); o.frequency.exponentialRampToValueAtTime(freq*.3,t+.06);
  g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(.001,t+.13); o.start(t); o.stop(t+.14);
  const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*.03),ac.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*.2));
  const s2=ac.createBufferSource(),g2=ac.createGain(); s2.buffer=buf; g2.gain.value=v*.5;
  s2.connect(g2); g2.connect(ac.destination); s2.start(t);
}
function synthBell(ac,freq,v,t){
  [1,2.756,5.404,8.933].forEach((r,i)=>{
    const o=ac.createOscillator(),g=ac.createGain(); o.type='sine';
    o.frequency.value=freq*r*.75; const amp=v/(i+1)*.55;
    g.gain.setValueAtTime(amp,t); g.gain.exponentialRampToValueAtTime(.0001,t+1.3/(i+1));
    o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+1.5);
  });
}
function synthClap(ac,freq,v,t){
  [0,.01,.022].forEach(off=>{
    const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*.08),ac.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.5);
    const s=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();
    f.type='bandpass'; f.frequency.value=1100; f.Q.value=.7;
    s.buffer=buf; s.connect(f); f.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(v*.8,t+off); g.gain.exponentialRampToValueAtTime(.001,t+off+.08); s.start(t+off);
  });
}
function synthWhistle(ac,freq,v,t){
  const o=ac.createOscillator(),g=ac.createGain(); o.type='sine';
  o.frequency.setValueAtTime(freq*1.8,t); o.frequency.exponentialRampToValueAtTime(freq*2.1,t+.03);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(v*.55,t+.015);
  g.gain.exponentialRampToValueAtTime(.001,t+.1); o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+.12);
}
// improved kick: deeper thump, longer sub, punch transient
function synthKick(ac,freq,v,t){
  const o=ac.createOscillator(),g=ac.createGain(); o.type='sine';
  o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(28,t+.18);
  g.gain.setValueAtTime(v*1.1,t); g.gain.exponentialRampToValueAtTime(.001,t+.32);
  o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+.35);
  // click transient
  const o2=ac.createOscillator(),g2=ac.createGain(); o2.type='triangle';
  o2.frequency.value=280; g2.gain.setValueAtTime(v*.45,t); g2.gain.exponentialRampToValueAtTime(.001,t+.018);
  o2.connect(g2); g2.connect(ac.destination); o2.start(t); o2.stop(t+.022);
  // noise punch layer
  const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*.03),ac.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*.35));
  const s=ac.createBufferSource(),lp=ac.createBiquadFilter(),g3=ac.createGain();
  lp.type='lowpass'; lp.frequency.value=220;
  s.buffer=buf; s.connect(lp); lp.connect(g3); g3.connect(ac.destination);
  g3.gain.value=v*.7; s.start(t);
}
// improved snare: richer body + crisper noise
function synthSnare(ac,freq,v,t){
  // body tone
  const o=ac.createOscillator(),g=ac.createGain(); o.type='triangle'; o.frequency.value=195;
  g.gain.setValueAtTime(v*.65,t); g.gain.exponentialRampToValueAtTime(.001,t+.22);
  o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+.24);
  // rimshot click
  const o2=ac.createOscillator(),g0=ac.createGain(); o2.type='square'; o2.frequency.value=900;
  g0.gain.setValueAtTime(v*.25,t); g0.gain.exponentialRampToValueAtTime(.001,t+.012);
  o2.connect(g0); g0.connect(ac.destination); o2.start(t); o2.stop(t+.015);
  // snare wire noise — two filtered layers
  [[3500,.3],[9000,.18]].forEach(([fc,gain])=>{
    const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*.2),ac.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*.38));
    const s=ac.createBufferSource(),f=ac.createBiquadFilter(),gn=ac.createGain();
    f.type='bandpass'; f.frequency.value=fc; f.Q.value=.8;
    s.buffer=buf; s.connect(f); f.connect(gn); gn.connect(ac.destination);
    gn.gain.setValueAtTime(v*gain,t); gn.gain.exponentialRampToValueAtTime(.001,t+.18); s.start(t);
  });
}
function synthHihat(ac,v,t,open){
  const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*(open?.38:.065)),ac.sampleRate),d=buf.getChannelData(0);
  const dc=open?.72:.22;
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*dc));
  const s=ac.createBufferSource(),f=ac.createBiquadFilter(),g=ac.createGain();
  f.type='highpass'; f.frequency.value=7200;
  s.buffer=buf; s.connect(f); f.connect(g); g.connect(ac.destination);
  g.gain.value=v*(open?.46:.4); s.start(t);
}
function synthCowbell(ac,freq,v,t){
  [540,800].forEach(fr=>{
    const o=ac.createOscillator(),g=ac.createGain(); o.type='square'; o.frequency.value=fr;
    g.gain.setValueAtTime(v*.38,t); g.gain.exponentialRampToValueAtTime(.001,t+.4);
    o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+.42);
  });
}
function synthShaker(ac,freq,v,t){
  const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*.05),ac.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*.3));
  const s=ac.createBufferSource(),f=ac.createBiquadFilter(),g=ac.createGain();
  f.type='bandpass'; f.frequency.value=5000; f.Q.value=1.2;
  s.buffer=buf; s.connect(f); f.connect(g); g.connect(ac.destination);
  g.gain.value=v*.58; s.start(t);
}
function synthTriangle(ac,freq,v,t){
  [1,3,5].forEach((h,i)=>{
    const o=ac.createOscillator(),g=ac.createGain(); o.type='sine';
    o.frequency.value=2100*h; const amp=v*.45/(i+1);
    g.gain.setValueAtTime(amp,t); g.gain.exponentialRampToValueAtTime(.0001,t+.7);
    o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+.75);
  });
}

// ── Canvas visualizer ─────────────────────────────────────────────────────────
const canvas=document.getElementById('rc'), c2=canvas.getContext('2d');
function resizeCanvas(){
  const w=Math.max(canvas.parentElement.clientWidth-40,200);
  canvas.width=w*devicePixelRatio; canvas.height=88*devicePixelRatio;
  canvas.style.width=w+'px'; canvas.style.height='88px';
}
function drawCanvas(cur){
  const W=canvas.width, H=canvas.height, dpr=devicePixelRatio;
  const total=beatsPerMeasure*subdivision, slotW=W/total;
  const maxH=H*.63, baseY=H-13*dpr;
  c2.clearRect(0,0,W,H);
  c2.fillStyle='#f7f6f2'; c2.fillRect(0,0,W,H);
  for(let b=0;b<beatsPerMeasure;b++){
    const acc=beatAccents[b]??1;
    for(let s=0;s<subdivision;s++){
      const idx=b*subdivision+s, x=idx*slotW;
      c2.fillStyle=b%2===0?'#f3f2ee':'#eeecea';
      c2.fillRect(x,0,slotW,baseY);
      const vel=(subPattern[s]??0)*(acc===0?0:1);
      if(vel>0){
        const bH=vel*maxH, isAcc=acc===2&&s===0, isBeat=s===0;
        const g=c2.createLinearGradient(0,baseY-bH,0,baseY);
        if(isAcc){g.addColorStop(0,'rgba(201,64,64,.82)');g.addColorStop(1,'rgba(201,64,64,.18)');}
        else if(isBeat){g.addColorStop(0,'rgba(200,119,58,.88)');g.addColorStop(1,'rgba(200,119,58,.18)');}
        else{g.addColorStop(0,`rgba(170,140,95,${.2+vel*.55})`);g.addColorStop(1,'rgba(170,140,95,.05)');}
        c2.fillStyle=g;
        const pad=Math.max(1,slotW*.1), bw=slotW-pad*2;
        c2.beginPath(); c2.roundRect(x+pad,baseY-bH,bw,bH,[2*dpr,2*dpr,0,0]); c2.fill();
      }
      if(s===0&&b>0){
        c2.strokeStyle='rgba(0,0,0,.07)'; c2.lineWidth=1;
        c2.beginPath(); c2.moveTo(x,0); c2.lineTo(x,baseY); c2.stroke();
      }
    }
  }
  c2.fillStyle='#ebe9e3'; c2.fillRect(0,baseY,W,H-baseY);
  c2.font=`${9*dpr}px "DM Mono"`; c2.textAlign='center';
  for(let b=0;b<beatsPerMeasure;b++){
    const cx=(b+.5)*subdivision*slotW;
    c2.fillStyle=b===0?'rgba(201,64,64,.7)':'rgba(160,120,80,.6)';
    c2.fillText(b+1, cx, H-2*dpr);
  }
  if(cur!=null&&cur>=0){
    const cx=cur*slotW;
    const cg=c2.createLinearGradient(cx,0,cx+slotW*.8,0);
    cg.addColorStop(0,'rgba(26,25,22,.2)'); cg.addColorStop(1,'rgba(26,25,22,0)');
    c2.fillStyle=cg; c2.fillRect(cx,0,slotW*.8,baseY);
    c2.strokeStyle='rgba(26,25,22,.42)'; c2.lineWidth=1.5*dpr;
    c2.beginPath(); c2.moveTo(cx,0); c2.lineTo(cx,baseY); c2.stroke();
  }
}
function animLoop(){
  let cur=null;
  if(isPlaying&&audioCtx){
    const now=audioCtx.currentTime, beatDur=60/bpm;
    const measureDur=beatsPerMeasure*beatDur, subDur=beatDur/subdivision;
    const e=((now-measureStartAudioTime)%measureDur+measureDur)%measureDur;
    cur=e/subDur;
  }
  drawCanvas(cur); requestAnimationFrame(animLoop);
}

// ── Beat dots ────────────────────────────────────────────────────────────────
function initBeatAccents(){
  beatAccents=Array.from({length:beatsPerMeasure},(_,i)=>i===0?2:1);
}
function buildBeatRow(){
  const el=document.getElementById('beatRow'); el.innerHTML='';
  for(let b=0;b<beatsPerMeasure;b++){
    const d=document.createElement('div');
    const acc=beatAccents[b]??1;
    d.className='bdot'; d.id='bd'+b; d.dataset.accent=acc;
    d.title='点击切换：强拍 / 普通拍 / 静音拍';
    d.onclick=()=>cycleBeatAccent(b);
    el.appendChild(d);
  }
}
function cycleBeatAccent(b){
  beatAccents[b]=beatAccents[b]===2?1:beatAccents[b]===1?0:2;
  const dot=document.getElementById('bd'+b); if(dot) dot.dataset.accent=beatAccents[b];
}

// ── Sound grid ────────────────────────────────────────────────────────────────
function buildSoundGrid(){
  const el=document.getElementById('soundGrid'); el.innerHTML='';
  SOUNDS.forEach((s,i)=>{
    const c=document.createElement('div');
    c.className='sound-card'+(i===selSound?' on':'');
    c.innerHTML=`<div class="sound-icon">${s.icon}</div><div class="sound-name">${s.name}</div>`;
    c.onclick=()=>{ selSound=i; buildSoundGrid(); };
    el.appendChild(c);
  });
}

// ── Den chips ────────────────────────────────────────────────────────────────
function buildDenChips(){
  const el=document.getElementById('denChips'); el.innerHTML='';
  [2,4,8,16,32].forEach(d=>{
    const c=document.createElement('div');
    c.className='dchip'+(d===beatValue?' on':''); c.textContent=d;
    c.onclick=()=>{ beatValue=d; document.getElementById('sigDenDisp').value=d; buildDenChips(); };
    el.appendChild(c);
  });
}

// ── Random mute ──────────────────────────────────────────────────────────────
const DENSITIES=[{label:'低 20%',p:.2},{label:'中 40%',p:.4},{label:'高 60%',p:.6}];
function buildDensityChips(){
  const el=document.getElementById('densityChips'); el.innerHTML='';
  DENSITIES.forEach((d,i)=>{
    const c=document.createElement('div');
    c.className='denschip'+(i===selDensity?' on':''); c.textContent=d.label;
    c.onclick=()=>{ selDensity=i; buildDensityChips(); };
    el.appendChild(c);
  });
}
function toggleRandomMute(){
  randomMute=!randomMute; muteBeatNow=false;
  document.getElementById('muteToggle').classList.toggle('on',randomMute);
  document.getElementById('muteBadge').textContent=randomMute?'开':'关';
  document.getElementById('muteDensityWrap').classList.toggle('show',randomMute);
}

// ── Patterns ─────────────────────────────────────────────────────────────────
function buildPatterns(){
  const tabs=document.getElementById('catTabs'); tabs.innerHTML='';
  CATS.forEach((cat,i)=>{
    const t=document.createElement('div');
    t.className='cat-tab'+(i===selCat?' on':''); t.textContent=cat.name;
    t.onclick=()=>{ selCat=i; buildPatterns(); }; tabs.appendChild(t);
  });
  const grid=document.getElementById('patGrid'); grid.innerHTML='';
  CATS[selCat].pats.forEach((p,i)=>{
    const isOn=i===selPat&&selCat===_lastCat;
    const card=document.createElement('div');
    card.className='pat-card'+(isOn?' on':'');
    const pv=p.vels.map(v=>`<div class="ppb" style="height:${Math.max(2,Math.round(v*13))}px;opacity:${v>0?1:.2}"></div>`).join('');
    card.innerHTML=`<div class="pat-name">${p.name}</div><div class="pat-desc">${p.desc}</div><div class="pat-preview">${pv}</div>`;
    card.onclick=()=>{ selPat=i; _lastCat=selCat; subdivision=p.subs; subPattern=p.vels; buildPatterns(); };
    grid.appendChild(card);
  });
}

// ── Scheduling ───────────────────────────────────────────────────────────────
function getFreq(b,s){ return beatAccents[b]===2&&s===0?1320:s===0?880:620; }
function scheduleClick(b,s,t,vel){
  const ac=getAC(), freq=getFreq(b,s);
  const v=volume*vel*(beatAccents[b]===2&&s===0?1:s===0?.82:.62);
  SOUNDS[selSound].fn(ac,freq,v,t);
}
function scheduleVisual(b,s,delay,muted){
  setTimeout(()=>{
    if(!isPlaying) return;
    document.querySelectorAll('.bdot').forEach(d=>d.classList.remove('lit','muted-beat'));
    const bd=document.getElementById('bd'+b);
    if(bd){ bd.classList.add(muted?'muted-beat':'lit'); }
    if(!muted){
      const led=document.getElementById('led'); led.classList.add('on');
      setTimeout(()=>led.classList.remove('on'),70);
    }
  }, Math.max(0,delay));
}
function scheduler(){
  const ac=getAC();
  while(nextNoteTime < ac.currentTime+SCHED){
    const b=currentBeat, s=currentSub;
    if(b===0&&s===0){
      measureStartAudioTime=nextNoteTime;
      currentMeasure++;
      // fire measure-boundary side effects slightly later to avoid blocking
      const cm=currentMeasure;
      setTimeout(()=>{ tickRamp(); advanceChord(); },0);
    }
    if(s===0){ muteBeatNow=randomMute&&Math.random()<DENSITIES[selDensity].p; }
    const acc=beatAccents[b]??1;
    const vel=(subPattern[s]??0)*(acc===0?0:acc===2&&s===0?1.1:1);
    if(vel>0&&!muteBeatNow) scheduleClick(b,s,nextNoteTime,vel);
    scheduleVisual(b,s,(nextNoteTime-ac.currentTime)*1000,muteBeatNow||(acc===0));
    nextNoteTime+=60/bpm/subdivision;
    currentSub++;
    if(currentSub>=subdivision){ currentSub=0; currentBeat=(currentBeat+1)%beatsPerMeasure; }
  }
  timerID=setTimeout(scheduler,LOOKAHEAD);
}
function togglePlay(){ isPlaying?stop():start(); }
function start(){
  getAC().resume(); isPlaying=true; currentBeat=0; currentSub=0; currentMeasure=0;
  rampMeasureCount=0;
  if(rampEnabled) setBpm(+document.getElementById('rampStart').value);
  resetChord();
  measureStartAudioTime=getAC().currentTime+.05; nextNoteTime=measureStartAudioTime;
  document.getElementById('playBtn').classList.add('playing');
  document.getElementById('rampProgress').classList.toggle('show',rampEnabled);
  updateRampStatus(); scheduler();
}
function stop(){
  isPlaying=false; clearTimeout(timerID);
  document.getElementById('playBtn').classList.remove('playing');
  document.getElementById('led').classList.remove('on');
  document.querySelectorAll('.bdot').forEach(d=>d.classList.remove('lit','muted-beat'));
  document.getElementById('rampProgress').classList.remove('show');
  updateRampStatus();
}

// ── BPM ──────────────────────────────────────────────────────────────────────
const TN=[[20,39,'Larghissimo'],[40,59,'Largo'],[60,65,'Larghetto'],[66,75,'Adagio'],
  [76,107,'Andante'],[108,119,'Moderato'],[120,155,'Allegro'],[156,175,'Vivace'],
  [176,200,'Presto'],[201,300,'Prestissimo']];
function getTN(b){ for(const[lo,hi,n]of TN) if(b>=lo&&b<=hi) return n; return ''; }
function setBpm(v){
  bpm=Math.max(20,Math.min(300,Math.round(+v||120)));
  const f=document.getElementById('bpmField'); if(+f.value!==bpm) f.value=bpm;
  document.getElementById('tname').textContent=getTN(bpm);
}
function adjBpm(d){ setBpm(bpm+d); }
document.getElementById('bpmField').addEventListener('change',e=>setBpm(e.target.value));
document.getElementById('bpmField').addEventListener('input',e=>{ if(e.target.value.length>=2) setBpm(e.target.value); });

// ── Time sig ──────────────────────────────────────────────────────────────────
document.getElementById('sigNum').addEventListener('change',e=>{
  const v=Math.max(1,Math.min(16,+e.target.value||4));
  beatsPerMeasure=v; e.target.value=v;
  initBeatAccents(); buildBeatRow();
  if(currentBeat>=v){ currentBeat=0; currentSub=0; }
});

// ── Volume ────────────────────────────────────────────────────────────────────
document.getElementById('volSl').addEventListener('input',e=>volume=+e.target.value);

// ── Tap tempo ─────────────────────────────────────────────────────────────────
function tapTempo(){
  const now=performance.now(); tapTimes.push(now);
  if(tapTimes.length>8) tapTimes.shift();
  if(tapTimes.length>1){
    const avg=tapTimes.slice(1).reduce((s,t,i)=>s+(t-tapTimes[i]),0)/(tapTimes.length-1);
    setBpm(Math.round(60000/avg));
  }
  clearTimeout(tapTimes._t); tapTimes._t=setTimeout(()=>tapTimes=[],2000);
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'){ e.preventDefault(); togglePlay(); }
  if(e.code==='KeyT') tapTempo();
  if(e.code==='ArrowUp') adjBpm(1);
  if(e.code==='ArrowDown') adjBpm(-1);
});

// ── Init ──────────────────────────────────────────────────────────────────────
resizeCanvas();
new ResizeObserver(resizeCanvas).observe(canvas.parentElement);
animLoop();
initBeatAccents(); buildBeatRow();
buildDenChips(); buildSoundGrid(); buildPatterns(); buildDensityChips();
updateChordBar();
subdivision=CATS[0].pats[1].subs; subPattern=CATS[0].pats[1].vels;
setBpm(120);
</script>
